# Expanded-window setup:
# Keep the paper start date, extend through 2026-05-28, and let the test set
# move to the final 20% of this longer sample. This is a separate no-leakage
# experiment and should not be compared as the same test period as the paper run.
data:
  ticker: "^GSPC"
  start: "2011-05-02"
  # yfinance end dates are exclusive, so 2026-05-29 includes 2026-05-28.
  end: "2026-05-29"
  # Use Yahoo Finance for this exploratory extended window.
  csv_path:
  date_column: "Date"
  sample_count:
  strict_paper_sample: false
  allow_truncate: false
  raw_output: "data/raw/sp500_yahoo_2011_2026.csv"

experiment:
  targets: ["High", "Low"]
  train_ratio: 0.8
  # Leave blank so the final 20% becomes the shifted test set.
  train_split_date:
  validation_ratio: 0.1
  window_size: 3
  # Paper robustness test uses T=1 daily, T=5 weekly, T=20 monthly.
  time_scale: 1
  random_seed: 42
  device: "auto"

decomposition:
  # Options:
  # - iceemdan_pso_vmd: proposed re-decomposition model
  # - iceemdan: ablation without VMD re-decomposition
  # - none: ablation without decomposition
  mode: "iceemdan_pso_vmd"
  # Options:
  # - full_sample: paper-style decomposition of the complete series before splitting.
  # - train_only_recursive: decompose only the fit window, then recursively
  #   forecast validation/test horizons without decomposing future data.
  # - walk_forward: decompose only the fit window for training, then for each
  #   validation/test day re-decompose actual history up to the previous day.
  scope: "walk_forward"
  # The code implements an ICEEMDAN-style ensemble decomposition following
  # the equations in the paper. Increase ensembles for publication-grade runs.
  max_imfs: 9
  ensembles: 100
  noise_strength: 0.2
  sift_max_iter: 100
  sift_tolerance: 0.05
  random_seed: 42

  pso_particles: 10
  pso_iterations: 15
  pso_inertia: 0.7
  pso_cognitive: 1.5
  pso_social: 1.5
  vmd_k_min: 2
  vmd_k_max: 6
  vmd_alpha_min: 500
  vmd_alpha_max: 5000
  vmd_tau: 0.0
  vmd_tolerance: 1.0e-7
  vmd_max_iter: 500
  # For S&P 500 replication, use Table 4 values from the paper.
  # Set false to re-run PSO search instead.
  use_paper_vmd_params: true
  pso_fitness: "envelope_entropy"
  paper_vmd_params:
    High:
      k: 3
      alpha: 2455
    Low:
      k: 3
      alpha: 2740

features:
  # Exogenous OHLC-derived and technical features are concatenated to component
  # windows as relative/percentage signals, not raw price levels. Forecasting
  # day t uses feature rows t-window_size through t-1, never the target-day row.
  enabled: true
  include_ohlc: true
  include_volume: true
  include_technical: true
  # Keep the residual trend model component-only by default; raw or even
  # relative features can otherwise destabilize the main price-level trend.
  use_for_res: false

model:
  # Variants: proposed, no_attention, no_tcn, no_bilstm,
  # lstm_sam_tcn, bilstm_sam_cnn.
  variant: "proposed"
  # Paper fixed parameters: window=3, Adam, dropout=0.2, TCN filters=32,
  # kernel=2, dilations=[1,2,4,8], early stopping patience=20.
  hidden_size: 64
  hidden_grid: [32, 64, 128]
  search_hyperparameters: false
  epochs: 100
  epoch_grid: [100, 200]
  batch_size: 32
  batch_grid: [16, 32, 64, 128]
  learning_rate: 0.001
  dropout: 0.2
  tcn_channels: 32
  tcn_kernel_size: 2
  tcn_dilations: [1, 2, 4, 8]
  patience: 20
  use_cached_params: true
  save_best_params: true
  # Leave blank to use outputs/<run>/best_params_<target>.json.
  param_cache_path:
  # true: train neural component models and save their weights.
  # false: skip training and load saved weights from checkpoint_dir.
  retrain_model: true
  checkpoint_dir: "outputs/sp500_2011_2026/model_weights"

conformal:
  # One-sided Adaptive Conformal Inference (Gibbs & Candes, NeurIPS 2021) on top
  # of model predictions. Scores keep signed residual direction:
  # (Actual - Predicted) / causal rolling volatility. High uses the upper tail;
  # Low uses the lower tail.
  enabled: true
  target_coverage: 0.95
  # About one trading year. For short validation splits, the method uses all
  # available validation residuals first, then updates online during testing.
  rolling_window: 252
  # Quantile q is estimated from recent standardized errors, so old extreme
  # regimes do not keep the interval wide forever.
  calibration_window: 63
  min_calibration_points: 30
  gamma: 0.005
  min_alpha: 0.001
  max_alpha: 0.5
  volatility_floor: 1.0e-8

outputs:
  directory: "outputs/sp500_2011_2026"
  save_component_predictions: true
  save_plots: true
